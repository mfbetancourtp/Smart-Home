<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <div class="icon-home">🏠</div>
      <h2>Smart Home</h2>
      <p>Bienvenido de vuelta. Controla tu hogar.</p>
    </div>

    <div *ngIf="mensajeError" class="alert-error">
      ⚠️ {{ mensajeError }}
    </div>

    <form (ngSubmit)="iniciarSesion()">
      <div class="form-group">
        <label for="correo">Correo Electrónico</label>
        <input 
          type="email" 
          id="correo"
          name="correo" 
          [(ngModel)]="correo" 
          required 
          placeholder="ejemplo@smarthome.com">
      </div>

      <div class="form-group">
        <label for="contrasena">Contraseña</label>
        <input 
          type="password" 
          id="contrasena"
          name="contrasena" 
          [(ngModel)]="contrasena" 
          required 
          placeholder="••••••••">
      </div>

      <button 
        type="submit" 
        class="btn-login" 
        [disabled]="!correo || !contrasena">
        Entrar al Sistema
      </button>
    </form>
  </div>
</div>
