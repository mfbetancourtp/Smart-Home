[build]
  # Entra a la carpeta del proyecto
  base = "Frontend/smart-home-frontend"

  # Quitamos el --prerender false porque al desactivar el SSR en angular.json ya no aplica
  command = "ng build"

  # La ruta de salida correcta para Angular
  publish = "dist/smart-home-frontend/browser"

[[redirects]]
  # Fundamental para que el router de Angular funcione sin dar 404 al recargar
  from = "/*"
  to = "/index.html"
  status = 200